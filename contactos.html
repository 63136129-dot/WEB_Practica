<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos - Anglas Suarez</title>
    <link rel="stylesheet" href="css/contactos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<main class="contenedor-contactos">
    <div class="background-decor"></div>

    <header class="contactos-header">
        <span class="badge">Hablemos</span>
        <h1>¿Tienes un proyecto en mente?</h1>
        <p>Estoy listo para ayudarte a llevar tus ideas al siguiente nivel tecnológico.</p>
    </header>

    <div class="layout-contactos">
        <section class="info-seccion">
            <div class="card-info">
                <h3>Información de Contacto</h3>
                <div class="dato-contacto">
                    <i class="fas fa-envelope"></i>
                    <p>63136129@idexpasco.edu.pe</p>
                </div>
                <div class="dato-contacto">
                    <i class="fas fa-location-dot"></i>
                    <p>Chaupimarca, Pasco</p>
                </div>
                
                <a href="https://wa.me/51938102045" target="_blank" class="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> Chat en WhatsApp
                </a>
            </div>
        </section>

        <section class="formulario-seccion">
            <form class="form-contacto">
                <div class="grupo-input">
                    <label>Nombre Completo</label>
                    <input type="text" placeholder="Escribe tu nombre..." required>
                </div>
                <div class="grupo-input">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="email@ejemplo.com" required>
                </div>
                <div class="grupo-input">
                    <label>Mensaje</label>
                    <textarea rows="5" placeholder="¿En qué puedo ayudarte?"></textarea>
                </div>
                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </section>
    </div>

    <div class="acciones-finales">
        <a href="index.html" class="link-volver">Volver al Inicio</a>
    </div>
</main>

</body>
</html>
